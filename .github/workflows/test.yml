name: 🧪 自动化测试

# 触发条件：推送到 main 或 PR
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 📦 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: myai-app/package-lock.json

      - name: 📥 安装依赖
        working-directory: ./myai-app
        run: npm ci

      - name: 🧪 运行测试
        working-directory: ./myai-app
        run: npm run test:coverage

      - name: 📊 上传覆盖率报告
        uses: codecov/codecov-action@v4
        with:
          directory: ./myai-app/coverage
          fail_ci_if_error: false

      - name: 🏗️ 构建验证
        working-directory: ./myai-app
        run: npm run build
